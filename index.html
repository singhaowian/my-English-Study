<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语学习资料库 | 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(120deg, #f5f7fa 0%, #e4edfb 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        /* 头部区域 */
        .site-header {
            text-align: center;
            padding: 80px 20px 60px;
        }
        .site-header h1 {
            font-size: 42px;
            color: #1a4fb8;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .site-header p {
            font-size: 18px;
            color: #555;
        }
        /* 专区卡片布局 */
        .entry-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 20px 0 80px;
        }
        .entry-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(26, 79, 184, 0.12);
            text-align: center;
            padding: 50px 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
        }
        .entry-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(26, 79, 184, 0.2);
        }
        .entry-card h2 {
            font-size: 28px;
            color: #1a4fb8;
            margin-bottom: 15px;
        }
        .entry-card p {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
        }
        .entry-card .tip {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 28px;
            background: #1a4fb8;
            color: #fff;
            border-radius: 30px;
            font-size: 15px;
        }
        /* 页脚 */
        footer {
            text-align: center;
            padding: 30px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <h1>英语学习资料库</h1>
            <p>AB级 | 大学英语四级 | 大学英语六级 全套备考资料</p>
        </header>

        <div class="entry-box">
            <!-- AB级专区 跳转 -->
            <a href="ab.html" class="entry-card">
                <h2>英语 AB级</h2>
                <p>高频词汇、语法考点、阅读技巧、翻译写作模板</p>
                <span class="tip">进入专区</span>
            </a>

            <!-- 四级专区 跳转 -->
            <a href="cet4.html" class="entry-card">
                <h2>大学英语四级</h2>
                <p>分值解析、真题讲解、阅读/翻译/作文专项训练</p>
                <span class="tip">进入专区</span>
            </a>

            <!-- 六级专区 跳转 -->
            <a href="cet6.html" class="entry-card">
                <h2>大学英语六级</h2>
                <p>长句拆分、段落匹配、重难点词汇、真题精讲</p>
                <span class="tip">进入专区</span>
            </a>
        </div>
    </div>

    <footer>
        © 英语学习资料库 仅供个人学习使用
    </footer>
</body>
</html>
